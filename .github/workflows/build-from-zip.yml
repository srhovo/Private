name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'PrivacySpaceMVP_PhoneBuild_v2.zip'
      - '.github/workflows/build-from-zip.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Unzip project
        run: |
          rm -rf PrivacySpaceMVP
          unzip -q PrivacySpaceMVP_PhoneBuild_v2.zip
          ls -la
          ls -la PrivacySpaceMVP

      - name: Build debug APK
        working-directory: PrivacySpaceMVP
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivacySpaceMVP-debug-apk
          path: PrivacySpaceMVP/app/build/outputs/apk/debug/*.apk
